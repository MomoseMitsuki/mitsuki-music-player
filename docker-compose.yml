services:
  postgres_db:
    image: postgres:latest
    container_name: music_platform_db
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: music_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    networks:
      - music_network

  nestjs_app:
    container_name: music_platform_api
    build:
      context: .
      dockerfile: ./packages/backend/Dockerfile
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://root:password123@postgres_db:5432/music_db?schema=public"
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
      - /usr/src/app/packages/backend/node_modules
    depends_on:
      - postgres_db
    networks:
      - music_network
    command: sh -c "npx prisma generate && npm run start:dev"

volumes:
  pgdata:

networks:
  music_network:
